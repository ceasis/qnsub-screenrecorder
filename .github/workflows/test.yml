# CI for qnsub-screenrecorder.
#
# Runs the pure-logic vitest suite on every push + PR. The suite
# covers the compositor math, face tracker, and filter helpers —
# basically anything that can run in plain Node without Electron /
# MediaPipe / WebGL. The status badge in README.md is driven by
# this workflow's success/failure state.
#
# We also typecheck to catch TS errors that unit tests wouldn't.

name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Test + typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test
